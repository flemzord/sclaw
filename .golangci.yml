version: "2"

linters:
  default: standard
  settings:
    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
  enable:
    - copyloopvar
    - errname
    - errorlint
    - govet
    - misspell
    - noctx
    - prealloc
    - revive
    - usestdlibvars
    - whitespace
    - gocritic
    - unparam
    - unconvert
    - unused
    - tparallel
    - tagliatelle

formatters:
  enable:
    - gofumpt
    - gofmt
    - gci
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
